<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/base :: head">
</head>
<body class="bg-gray-100 min-h-screen">

    <nav th:replace="layout/base :: navbar"></nav>

    <main class="max-w-2xl mx-auto px-6 py-10">

        <div class="flex items-center gap-3 mb-8">
            <a th:href="@{/testimonios}" class="text-gray-400 hover:text-gray-600 transition">
                <i class="fa-solid fa-arrow-left"></i>
            </a>
            <h1 class="text-3xl font-bold text-gray-800"
                th:text="${testimonio.idTest != null} ? 'Editar Testimonio' : 'Nuevo Testimonio'"></h1>
        </div>

        <div class="bg-white rounded-2xl shadow p-8">
            <form th:action="${testimonio.idTest != null} ? @{/testimonios/actualizar} : @{/testimonios/guardar}"
                  th:object="${testimonio}"
                  method="post"
                  class="flex flex-col gap-5">

                <input type="hidden" th:field="*{idTest}">
                <input type="hidden" th:field="*{fechaCreacion}">

                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-gray-700">Nombre</label>
                    <input type="text" th:field="*{nombreTest}" maxlength="50" required
                           class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
                           placeholder="Nombre del autor">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-gray-700">Cargo / Empresa</label>
                    <input type="text" th:field="*{cargoEmpresa}" maxlength="50" required
                           class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
                           placeholder="Ej: CEO en Empresa S.A.">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-gray-700">Testimonio</label>
                    <textarea th:field="*{opinion}" maxlength="250" required rows="4"
                              class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400 resize-none"
                              placeholder="Opinión o testimonio..."></textarea>
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-gray-700">URL de imagen <span class="text-gray-400">(opcional)</span></label>
                    <input type="url" th:field="*{imagenUrl}" maxlength="200"
                           class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
                           placeholder="https://...">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-gray-700">Instagram</label>
                    <input type="text" th:field="*{instagramUrl}" maxlength="250" required
                           class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
                           placeholder="https://instagram.com/...">
                </div>

                <div class="flex flex-col gap-1">
                    <label class="text-sm font-medium text-gray-700">Facebook</label>
                    <input type="text" th:field="*{facebookUrl}" maxlength="250" required
                           class="border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-gray-400"
                           placeholder="https://facebook.com/...">
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="flex-1 bg-gray-800 text-white py-2 rounded-lg text-sm tracking-widest hover:bg-gray-600 transition duration-200">
                        GUARDAR
                    </button>
                    <a th:href="@{/testimonios}"
                       class="flex-1 text-center border border-gray-300 text-gray-600 py-2 rounded-lg text-sm hover:bg-gray-50 transition duration-200">
                        CANCELAR
                    </a>
                </div>

            </form>
        </div>

    </main>

</body>
</html>
